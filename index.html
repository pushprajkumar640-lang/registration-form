<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Form</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="form-container">
        <h1>Registration Form</h1>

        <div class="form-group">
            <label for="name">Name</label>
            <input type="text" id="name" placeholder="Enter Name">
        </div>

        <div class="form-group">
            <label for="phone">Phone</label>
            <input type="tel" id="phone" placeholder="Enter Phone">
        </div>

        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" placeholder="Enter Email">
        </div>

        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" placeholder="Enter Password">
        </div>

        <div class="form-group">
            <label for="dob">Date of Birth</label>
            <input type="date" id="dob">
        </div>

        <div class="form-group">
            <label for="gender">Gender</label>
            <select id="gender">
                <option value="">Select Gender</option>
                <option value="Male">Male</option>
                <option value="Female">Female</option>
                <option value="Other">Other</option>
            </select>
        </div>

        <div class="form-group checkbox-group">
            <input type="checkbox" id="terms">
            <label for="terms">I agree to the terms and conditions</label>
        </div>

        <div class="form-group">
            <label for="comments">Comments</label>
            <textarea id="comments" placeholder="Enter your comments"></textarea>
        </div>

        <button class="btn-submit" onclick="submitForm()">Submit</button>
    </div>

    <!-- Result table -->
    <div class="result-container" id="resultBox">
        <h2>✅ Form Submitted Successfully!</h2>
        <table>
            <tr><th>Field</th><th>Value</th></tr>
            <tr><td>Name</td><td id="r-name"></td></tr>
            <tr><td>Phone</td><td id="r-phone"></td></tr>
            <tr><td>Email</td><td id="r-email"></td></tr>
            <tr><td>Password</td><td id="r-password"></td></tr>
            <tr><td>Date of Birth</td><td id="r-dob"></td></tr>
            <tr><td>Gender</td><td id="r-gender"></td></tr>
            <tr><td>Terms Agreed</td><td id="r-terms"></td></tr>
            <tr><td>Comments</td><td id="r-comments"></td></tr>
        </table>
    </div>

    <script src="script.js"></script>
</body>
</html>
